name: SpeechToMarkdown
options:
  bundleIdPrefix: com.stmd
  deploymentTarget:
    macOS: "13.0"
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
    OTHER_SWIFT_FLAGS: "-strict-concurrency=minimal"

targets:
  SpeechToMarkdown:
    type: application
    platform: macOS
    sources:
      - path: SpeechToMarkdown
        excludes:
          - "**/*.md"
      - path: Shared
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stmd.speechtomarkdown
        PRODUCT_NAME: SpeechToMarkdown
        INFOPLIST_FILE: SpeechToMarkdown/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: SpeechToMarkdown/Resources/SpeechToMarkdown.entitlements
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSET_CATALOG_APP_ICON: AppIcon
    dependencies: []
    preBuildScripts:
      - name: SwiftLint
        script: |
          if which swiftlint > /dev/null; then
            swiftlint
          fi

  SpeechToMarkdownIOS:
    type: application
    platform: iOS
    sources:
      - path: Shared
        excludes:
          - "**/*.md"
      - path: SpeechToMarkdownIOS
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stmd.speechtomarkdown.ios
        PRODUCT_NAME: SpeechToMarkdown
        # Same module name as the macOS app so shared test files can
        # `@testable import SpeechToMarkdown` unchanged on both platforms.
        PRODUCT_MODULE_NAME: SpeechToMarkdown
        INFOPLIST_FILE: SpeechToMarkdownIOS/Resources/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_HARDENED_RUNTIME: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies: []
    scheme:
      testTargets:
        - SpeechToMarkdownIOSTests

  SpeechToMarkdownTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/SpeechToMarkdownTests
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SpeechToMarkdown.app/Contents/MacOS/SpeechToMarkdown"
    dependencies:
      - target: SpeechToMarkdown

  SpeechToMarkdownIOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/SpeechToMarkdownIOSTests
      # Portable pure-logic tests reused from the macOS bundle; excluded files
      # exercise macOS-only types (whisper subprocess, downloads).
      - path: Tests/SpeechToMarkdownTests
        includes:
          - TranscriptBufferTests.swift
          - OutputFormatTests.swift
          - LocalLLMServiceTests.swift
          - STMDFileManagerTests.swift
          - STMDSessionTests.swift
          - SessionStateTests.swift
          - AgentModeTests.swift
          - ModelSizeTests.swift
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SpeechToMarkdown.app/SpeechToMarkdown"
    dependencies:
      - target: SpeechToMarkdownIOS
