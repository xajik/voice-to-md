name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build, Ad-Hoc Sign & Release
    runs-on: macos-15
    timeout-minutes: 60

    env:
      SCHEME: VoiceToMarkdown
      APP_NAME: VoiceToMarkdown
      BUNDLE_ID: com.vtmd.voicetomarkdown

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Install Build Tools
        run: |
          brew install xcodegen create-dmg

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build Archive (Ad-Hoc Signed)
        run: |
          xcodebuild \
            -scheme "$SCHEME" \
            -configuration Release \
            -derivedDataPath .build \
            CODE_SIGNING_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            archive \
            -archivePath .build/VoiceToMarkdown.xcarchive | xcpretty

      - name: Extract App Binary
        run: |
          mkdir -p .build/export
          cp -R .build/VoiceToMarkdown.xcarchive/Products/Applications/$APP_NAME.app .build/export/$APP_NAME.app

      - name: Create DMG Packaging
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Fallback version if triggered manually via workflow_dispatch
          if [ -z "$VERSION" ] || [ "$VERSION" = "main" ]; then VERSION="1.0.0"; fi
          
          create-dmg \
            --volname "$APP_NAME $VERSION" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "$APP_NAME.app" 175 190 \
            --hide-extension "$APP_NAME.app" \
            --app-drop-link 425 190 \
            ".build/$APP_NAME-$VERSION.dmg" \
            ".build/export/$APP_NAME.app"

          echo "DMG_PATH=.build/$APP_NAME-$VERSION.dmg" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Generate Sparkle Appcast
        run: |
          cat > appcast.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>VoiceToMarkdown Updates</title>
              <item>
                <title>Version $VERSION</title>
                <sparkle:version>$VERSION</sparkle:version>
                <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>
                <enclosure
                  url="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$APP_NAME-$VERSION.dmg"
                  length="$(stat -f%z "$DMG_PATH")"
                  type="application/octet-stream"/>
              </item>
            </channel>
          </rss>
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "VoiceToMarkdown ${{ env.VERSION }}"
          body: |
            ## VoiceToMarkdown ${{ env.VERSION }}

            ### ⚠️ Bypass Gatekeeper (Required)
            Because this is an open-source build without an Apple Developer signature, macOS will prevent it from launching normally at first.
            
            1. Download and open `VoiceToMarkdown-${{ env.VERSION }}.dmg`.
            2. Drag the app to your **Applications** folder.
            3. **Do not double-click the app to open it.** Instead, **Right-click (or Control-click)** the app icon and select **Open**.
            4. Click **Open** on the confirmation prompt. You only need to do this once!

            ### Requirements
            - macOS 13.0+
            - Dependencies: `brew install whisper-cpp ffmpeg tmux`
          files: |
            ${{ env.DMG_PATH }}
            appcast.xml