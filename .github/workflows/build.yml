name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    # Covers the macOS app and the Shared/ core (all shared unit tests run
    # in the macOS bundle).
    name: macOS — Build and Test
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -scheme VoiceToMarkdown \
            -configuration Debug \
            -derivedDataPath .build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build | xcpretty

      - name: Test
        run: |
          set -o pipefail
          xcodebuild \
            -scheme VoiceToMarkdown \
            -configuration Debug \
            -derivedDataPath .build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            test | xcpretty

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-test-results
          path: .build/Logs/Test

  ios:
    # Builds the iOS app (deployment target iOS 26 → needs Xcode 26) and runs
    # the iOS test bundle in a simulator: shared pure-logic tests plus the
    # iOS-only controller/prompt tests. On-device pieces (SpeechAnalyzer
    # models, Foundation Models generation) need real Apple Intelligence
    # hardware and are behind service seams, so CI covers everything else.
    name: iOS — Build and Test
    runs-on: macos-26
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode 26
        run: |
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE" ]; then XCODE=/Applications/Xcode.app; fi
          sudo xcode-select -switch "$XCODE"
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve iOS simulator
        run: |
          UDID=$(xcrun simctl list devices available --json | python3 -c "
          import json, sys
          devices = json.load(sys.stdin)['devices']
          for runtime in sorted(devices, reverse=True):
              if 'iOS' not in runtime:
                  continue
              for device in devices[runtime]:
                  if device['name'].startswith('iPhone'):
                      print(device['udid'])
                      sys.exit()
          ")
          if [ -z "$UDID" ]; then
            RUNTIME=$(xcrun simctl list runtimes | awk '/^iOS/ {print $NF}' | tail -1)
            UDID=$(xcrun simctl create "CI iPhone" "iPhone 17" "$RUNTIME")
          fi
          xcrun simctl list devices | grep "$UDID"
          echo "SIMULATOR_UDID=$UDID" >> "$GITHUB_ENV"

      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -scheme VoiceToMarkdownIOS \
            -configuration Debug \
            -derivedDataPath .build \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build | xcpretty

      - name: Test
        run: |
          set -o pipefail
          xcodebuild \
            -scheme VoiceToMarkdownIOS \
            -configuration Debug \
            -derivedDataPath .build \
            -destination "id=$SIMULATOR_UDID" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            test | xcpretty

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: .build/Logs/Test
